# CineSynk Advanced CI/CD Pipeline
# Implements: Linting/Testing -> Security (Snyk) -> Performance (Lighthouse) -> Docker Build -> Notification

name: CineSynk CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # 1. BUILD AND TEST (Parallel)
  # ------------------------------------------------------------------
  backend-check:
    name: Backend (Build & Verify)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x' # Using 9.0 stable for safe builds
    - name: Restore
      run: dotnet restore backend/TicketBooking.Api/TicketBooking.Api.csproj
    - name: Build
      run: dotnet build backend/TicketBooking.Api/TicketBooking.Api.csproj --no-restore

  frontend-check:
    name: Frontend (Lint & Build)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install
      run: cd frontend && npm ci
    - name: Build
      run: cd frontend && npm run build

  # ------------------------------------------------------------------
  # 2. SECURITY SCANNING (Snyk)
  # ------------------------------------------------------------------
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Backend Scan
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/TicketBooking.Api/TicketBooking.Api.csproj --severity-threshold=high
      - name: Snyk Frontend Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=frontend/package.json --severity-threshold=high

  # ------------------------------------------------------------------
  # 3. PERFORMANCE AUDIT (Lighthouse)
  # ------------------------------------------------------------------
  lighthouse-audit:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [frontend-check]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Frontend
        run: cd frontend && npm ci && npm run build
      - name: Audit Performance
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Note: In a real CI, we'd serve the 'dist' folder here for a local audit

  # ------------------------------------------------------------------
  # 4. DOCKER VERIFICATION
  # ------------------------------------------------------------------
  docker-verify:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [snyk-scan, lighthouse-audit]
    steps:
    - uses: actions/checkout@v4
    - name: Verify Docker Compose Build
      run: docker-compose build

  # ------------------------------------------------------------------
  # 5. DOCKER BUILD & DEPLOY TO AWS
  # ------------------------------------------------------------------
  deploy:
    name: Build & Deploy to ECS
    needs: [snyk-scan, lighthouse-audit, docker-verify]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push API image to Amazon ECR
      id: build-image-api
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: cinesynk-api
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend/TicketBooking.Api
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build, tag, and push Frontend image to Amazon ECR
      id: build-image-frontend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: cinesynk-frontend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy Amazon ECS (API)
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: infrastructure/ecs/api-task-def.json
        service: cinesynk-api-service
        cluster: cinesynk-cluster
        wait-for-service-stability: true

    - name: Deploy Amazon ECS (Frontend)
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: infrastructure/ecs/frontend-task-def.json
        service: cinesynk-frontend-service
        cluster: cinesynk-cluster
        wait-for-service-stability: true

  # ------------------------------------------------------------------
  # 5. NOTIFICATION
  # ------------------------------------------------------------------
  notify:
    name: Status Notification
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy]
    steps:
      - name: Send Discord Notification
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: "🚀 CineSynk CI/CD Update"
          embed-title: "Build Status: ${{ needs.docker-verify.result }}"
          embed-description: |
            **Commit**: ${{ github.event.head_commit.message }}
            **Author**: ${{ github.actor }}
            **Workflow**: ${{ github.workflow }}
            [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          embed-color: ${{ (needs.docker-verify.result == 'success') && 65280 || 16711680 }}
