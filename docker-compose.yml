services:
  db:
    image: mariadb:10.11
    container_name: cinesynk-db
    restart: always
    environment:
      MARIADB_DATABASE: bookingapplication
      MARIADB_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend/TicketBooking.Api
      dockerfile: Dockerfile
    container_name: cinesynk-api
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=server=db;port=3306;user=root;password=rootpassword;database=bookingapplication
      - JwtSettings__Key=this_is_a_very_secret_and_long_key_for_development_purposes
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinesynk-ui
    depends_on:
      - backend
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: cinesynk-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: cinesynk-grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml

volumes:
  db_data:
